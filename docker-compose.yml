services:
  music-tagger:
    build: .
    container_name: music-tagger
    ports:
      - "${PORT:-8080}:8080"
    environment:
      MUSIC_DIR: /music
      PORT: 8080
      DB_PATH: /data/music-tagger.db
      # Required for identification (AcoustID -> MusicBrainz). Set both in
      # .env; identification requests fail with a clear error if missing.
      ACOUSTID_API_KEY: ${ACOUSTID_API_KEY:-}
      MUSICBRAINZ_USER_AGENT: ${MUSICBRAINZ_USER_AGENT:-}
    volumes:
      # Host path to your real music library. Override via .env
      # (MUSIC_LIBRARY_PATH=/absolute/path/to/your/music) or:
      #   MUSIC_LIBRARY_PATH=/absolute/path docker compose up
      - ${MUSIC_LIBRARY_PATH:-./music}:/music
      # Tracking database — kept separate from /music so nothing is ever
      # written to the music library itself.
      - music-tagger-data:/data
    restart: unless-stopped

  syncthing:
    image: syncthing/syncthing
    container_name: syncthing
    hostname: music-tagger-syncthing
    environment:
      # Must match the host user that owns MUSIC_LIBRARY_PATH, or Syncthing
      # won't be able to write new files into it. Override in .env if your
      # host user isn't uid/gid 1000.
      PUID: ${SYNCTHING_PUID:-1000}
      PGID: ${SYNCTHING_PGID:-1000}
    volumes:
      - syncthing-config:/var/syncthing/config
      # Same host path as music-tagger's /music mount, so anything synced
      # in here is immediately visible to the next library scan.
      - ${MUSIC_LIBRARY_PATH:-./music}:/var/syncthing/music
    ports:
      - "8384:8384"        # Web GUI — keep this off the public internet
      - "22000:22000/tcp"  # Sync protocol
      - "22000:22000/udp"
      - "21027:21027/udp"  # Local network discovery
    restart: unless-stopped

volumes:
  music-tagger-data:
  syncthing-config:
